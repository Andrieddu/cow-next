name: Release

env:
  NODE_VERSION: 24.14

on:
  release:
    types: [published]

jobs:
  release_and_deploy:
    name: Version Bump & Prod Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Git Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package.json version
        run: npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version

      - name: Commit and push to master
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git commit -am "chore(release): bump version to ${{ github.ref_name }} [skip ci]"
            git push origin master
          else
            echo "No changes: package.json already aligned with the release"
          fi

      - name: Deploy to production (sync master to production branch)
        run: git push origin master:production --force
